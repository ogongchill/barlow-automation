name: Deploy Lambda

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'requirements-deploy.txt'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  S3_BUCKET: barlow-deploy-bucket
  S3_KEY: automation/lambda-${{ github.sha }}.zip

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'doc:') }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build package
        run: |
          mkdir -p dist/package
          pip install -r requirements-deploy.txt -t dist/package/ \
            --platform manylinux2014_aarch64 \
            --only-binary=:all: \
            --quiet
          cp -r src dist/package/
          cd dist/package && zip -r ../lambda.zip . -q

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::620455725922:role/automation-deployer-role
          aws-region: ap-northeast-2

      - name: Upload to S3
        run: |
          aws s3 cp dist/lambda.zip s3://${{ env.S3_BUCKET }}/${{ env.S3_KEY }}

      - name: Deploy Ack Lambda
        run: |
          aws lambda update-function-code \
            --function-name barlow-slack-ack \
            --s3-bucket ${{ env.S3_BUCKET }} \
            --s3-key ${{ env.S3_KEY }}

      - name: Deploy Worker Lambda
        run: |
          aws lambda update-function-code \
            --function-name barlow-automation-worker \
            --s3-bucket ${{ env.S3_BUCKET }} \
            --s3-key ${{ env.S3_KEY }}

      - name: Update Parameter Store
        run: |
          aws ssm put-parameter \
            --name /automation/deploy/current-key \
            --value "${{ env.S3_KEY }}" \
            --type String --overwrite

          aws ssm put-parameter \
            --name /automation/deploy/current-sha \
            --value "${{ github.sha }}" \
            --type String --overwrite
